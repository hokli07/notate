<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📝 My Notes</h1>

        <div class="addNote">

            <input
                type="text"
                id="title"
                placeholder="Заголовок">

            <textarea
                id="text"
                placeholder="Текст нотатки"></textarea>

            <button id="addBtn">
                Додати нотатку
            </button>

        </div>

        <hr>

        <div id="notes">

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
